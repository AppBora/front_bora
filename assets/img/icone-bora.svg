<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Bora icone">
  <title>Bora</title>

  <!-- Fundo quadrado arredondado roxo -->
  <rect x="0" y="0" width="48" height="48" rx="12" ry="12" fill="#7c3aed"/>

  <!-- Sacola de entrega estilizada em branco -->
  <rect x="9" y="20" width="26" height="20" rx="3" ry="3" fill="none" stroke="#ffffff" stroke-width="2.4"/>
  <!-- Alça -->
  <path d="M14 20 Q14 12 22 12 Q30 12 30 20" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Seta verde de velocidade (saindo da sacola para direita) -->
  <path d="M35 27 L43 27" stroke="#22c55e" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M40 23 L44 27 L40 31" fill="none" stroke="#22c55e" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ponto de status em tempo real -->
  <circle cx="38" cy="13" r="4" fill="#22c55e"/>
</svg>
