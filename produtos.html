<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BoraHapp - Produtos</title><link rel="icon" href="assets/img/icone-bora.svg"><link rel="stylesheet" href="assets/css/styles.css?v=20260623"></head><body>
<div class="layout">
  <aside class="side"><div class="brand"><div class="logo"></div><div><b data-store>BoraHapp</b><br><small>Delivery em tempo real</small></div></div>
    <nav class="nav"><a href="dashboard.html">Dashboard</a><a href="pedidos.html">Pedidos</a><a href="clientes.html">Clientes</a><a class="active" href="produtos.html">Produtos</a><a href="entregas.html">Entregas</a><a href="promocoes.html">Promoções</a><a href="relatorios.html">Relatórios</a><a href="configuracoes.html">Configurações</a><a class="" href="usuarios.html">Usuários</a><a href="planos.html">Planos</a></nav>
  </aside>
  <main class="main">
    <header class="top"><div class="title"><h1>Produtos</h1><p data-store>Sorveteria da Rosa</p></div>
      <a class="btn" href="#" onclick="Bora.logout();return false" style="background:#64748b">Sair</a></header>
    <section class="row">
      <div class="card"><h2>Novo produto</h2>
        <form id="form" class="form">
          <div class="field full"><label>Nome</label><input id="nome" required></div>
          <div class="field"><label>Categoria</label><input id="categoria"></div>
          <div class="field"><label>Preço de venda (R$)</label><input id="preco" type="number" step="0.01" min="0" required></div>
          <div class="field"><label>Custo (R$) <small style="color:#94a3b8">p/ CMV</small></label><input id="custo" type="number" step="0.01" min="0"></div>
          <div class="field"><label>Estoque <small style="color:#94a3b8">vazio = não controla</small></label><input id="estoque" type="number" step="1"></div>
          <div class="field"><label>Estoque mínimo</label><input id="estoqueMinimo" type="number" step="1"></div>
          <div class="field full"><label>Foto do produto <small style="color:#94a3b8">aparece no cardápio digital</small></label><input type="file" id="fotoProduto" accept="image/*"> <img id="fotoPrev" hidden style="height:44px;border-radius:8px;vertical-align:middle;margin-left:8px"></div>
          <input type="hidden" id="id">
          <div class="field full"><button class="btn" type="submit" id="btnSalvar">Salvar produto</button> <button type="button" class="btn secondary" id="cancelar" style="display:none">Cancelar</button> <span id="msg" style="color:var(--danger);margin-left:10px"></span></div>
        </form>
      </div>
      <div class="card"><h2>Catálogo da loja</h2>
        <table class="table"><thead><tr><th>Produto</th><th>Preço</th><th>Margem</th><th>Estoque</th><th></th></tr></thead><tbody id="lista"></tbody></table>
      </div>
    </section>
  </main>
</div>
<script src="assets/js/api.js?v=20260623"></script><script src="assets/js/app.js?v=20260623"></script><script src="assets/js/whitelabel.js?v=20260623"></script><script src="assets/js/produtos.js?v=20260623"></script><script src="assets/js/complementos-gestao.js?v=20260708"></script>
</body></html>
