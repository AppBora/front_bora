<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bora — Criar conta</title>
  <link rel="icon" href="assets/img/icone-bora.svg">
  <link rel="stylesheet" href="assets/css/styles.css?v=20260623">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:#fff;border-radius:16px;box-shadow:0 8px 30px #0002;padding:32px;width:100%;max-width:380px}
    .login-card h1{margin:0 0 4px;font-size:22px;color:var(--primary,#7c3aed)}
    .login-card p{margin:0 0 16px;color:#64748b;font-size:14px}
    .login-card label{display:block;font-size:13px;color:#334155;margin:12px 0 4px}
    .login-card input{width:100%;padding:11px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;box-sizing:border-box}
    .login-card button{width:100%;margin-top:18px;padding:12px;border:0;border-radius:8px;background:var(--primary,#7c3aed);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
    .login-card button:disabled{opacity:.6;cursor:default}
    .login-err{margin-top:12px;color:#dc2626;font-size:13px;min-height:18px}
    .login-foot{margin-top:16px;font-size:13px;color:#94a3b8;text-align:center}
    .login-foot a{color:var(--primary,#7c3aed);font-weight:600;text-decoration:none}
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="form">
      <img src="assets/img/logo-bora.svg" alt="Bora" style="height:46px;margin-bottom:10px">
      <h1>Criar sua conta</h1>
      <p>Crie sua loja e teste sem compromisso. Leva 1 minuto.<br><small>Plano único: <b>R$ 299/mês por loja</b> — pedidos ilimitados.</small></p>
      <label>Nome da loja</label>
      <input id="nomeLoja" required placeholder="Ex.: Pizzaria do João">
      <label>Seu nome</label>
      <input id="adminNome" placeholder="Seu nome">
      <label>E-mail</label>
      <input type="email" id="email" required autocomplete="username" placeholder="voce@loja.com">
      <label>Senha</label>
      <input type="password" id="senha" required autocomplete="new-password" placeholder="mínimo 6 caracteres">
      <button type="submit" id="btn">Criar conta grátis</button>
      <div class="login-err" id="err"></div>
      <div class="login-foot">Já tem conta? <a href="login.html">Entrar</a><br>
        <small style="color:#94a3b8">Dono de rede: use o mesmo e-mail e senha para criar outra loja na mesma conta.</small></div>
    </form>
  </div>
  <script src="assets/js/api.js?v=20260623"></script>
  <script>
    if (Bora.token()) location.href = 'dashboard.html';
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn'), err = document.getElementById('err');
      btn.disabled = true; btn.textContent = 'Criando...'; err.textContent = '';
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      try {
        const r = await Bora.api('/public/signup', { method: 'POST', body: JSON.stringify({
          nomeLoja: document.getElementById('nomeLoja').value.trim(),
          adminNome: document.getElementById('adminNome').value.trim(),
          adminEmail: email,
          adminSenha: senha
        })});
        // já entra direto (auto-login); se a loja foi vinculada a uma conta existente, entra já nela
        const resp = await Bora.login(email, senha);
        Bora.setSession(resp);
        if (r && r.vinculada && r.lojaId) {
          try { const t = await Bora.trocarLoja(r.lojaId); Bora.setSession(t); } catch (e) {}
        }
        location.href = 'dashboard.html';
      } catch (ex) {
        err.textContent = ex.message || 'Falha ao criar conta';
        btn.disabled = false; btn.textContent = 'Criar conta grátis';
      }
    });
  </script>
</body>
</html>
