<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bora - Usuários</title><link rel="icon" href="assets/img/icone-bora.svg"><link rel="stylesheet" href="assets/css/styles.css?v=20260623"></head><body>
<div class="layout">
  <aside class="side"><div class="brand"><div class="logo"></div><div><b data-store>Bora</b><br><small>Delivery em tempo real</small></div></div>
    <nav class="nav"><a href="dashboard.html">Dashboard</a><a href="pedidos.html">Pedidos</a><a href="clientes.html">Clientes</a><a href="produtos.html">Produtos</a><a href="entregas.html">Entregas</a><a href="promocoes.html">Promoções</a><a href="relatorios.html">Relatórios</a><a href="configuracoes.html">Configurações</a><a class="active" href="usuarios.html">Usuários</a><a href="planos.html">Planos</a></nav>
  </aside>
  <main class="main">
    <header class="top"><div class="title"><h1>Usuários</h1><p data-store>Sorveteria da Rosa</p></div>
      <a class="btn" href="#" onclick="Bora.logout();return false" style="background:#64748b">Sair</a></header>
    <section class="row">
      <div class="card"><h2>Novo usuário</h2>
        <form id="form" class="form">
          <div class="field full"><label>Nome</label><input id="nome" required></div>
          <div class="field"><label>E-mail</label><input id="email" type="email" required></div>
          <div class="field"><label>Senha (mín. 6)</label><input id="senha" type="password" required></div>
          <div class="field full"><label>Papel</label><select id="papel"><option value="OPERADOR">Operador</option><option value="GERENTE">Gerente</option><option value="ADMINISTRADOR_LOJA">Administrador da loja</option></select></div>
          <div class="field full"><button class="btn" type="submit">Criar usuário</button> <span id="msg" style="margin-left:10px"></span></div>
        </form>
      </div>
      <div class="card"><h2>Equipe da loja</h2>
        <table class="table"><thead><tr><th>Nome</th><th>E-mail</th><th>Papel</th><th>Status</th></tr></thead><tbody id="lista"></tbody></table>
      </div>
    </section>
  </main>
</div>
<script src="assets/js/api.js?v=20260623"></script><script src="assets/js/app.js?v=20260623"></script><script src="assets/js/whitelabel.js?v=20260623"></script><script src="assets/js/usuarios.js?v=20260623"></script>
</body></html>
