<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bora - Contagem de Estoque</title><link rel="icon" href="assets/img/icone-bora.svg"><link rel="stylesheet" href="assets/css/styles.css?v=20260623"></head><body>
<div class="layout">
  <aside class="side"><div class="brand"><div class="logo"></div><div><b data-store>Bora</b><br><small>Delivery em tempo real</small></div></div>
    <nav class="nav"></nav>
  </aside>
  <main class="main">
    <header class="top"><div class="title"><h1>Contagem de Estoque (Inventário)</h1><p>Digite o que contou no físico — o sistema mostra a diferença e ajusta</p></div>
      <a class="btn" href="estoque.html" style="background:#64748b">← Estoque</a></header>

    <section class="kpis" style="grid-template-columns:repeat(3,1fr)">
      <div class="statcard"><div class="ico cart">📦</div><div class="v" id="kItens">—</div><div class="l">Itens contados</div></div>
      <div class="statcard"><div class="ico cancel">↕️</div><div class="v" id="kDiv">—</div><div class="l">Com divergência</div></div>
      <div class="statcard"><div class="ico money">💰</div><div class="v" id="kImpacto">—</div><div class="l">Impacto no custo</div></div>
    </section>

    <div class="panel">
      <table class="table">
        <thead><tr><th>Produto</th><th>Sistema</th><th>Contado</th><th>Diferença</th></tr></thead>
        <tbody id="lista"></tbody>
      </table>
      <div style="margin-top:14px"><button class="btn" id="aplicar">✓ Aplicar contagem</button> <span id="msg" style="margin-left:10px;color:#059669"></span></div>
    </div>
  </main>
</div>
<script src="assets/js/api.js?v=20260623"></script><script src="assets/js/app.js?v=20260623"></script><script src="assets/js/whitelabel.js?v=20260623"></script><script src="assets/js/contagem.js?v=20260623"></script>
</body></html>
