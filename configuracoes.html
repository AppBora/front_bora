<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bora - Configurações da Loja</title><link rel="icon" href="assets/img/icone-bora.svg"><link rel="stylesheet" href="assets/css/styles.css?v=20260623"></head><body>
<div class="layout">
  <aside class="side"><div class="brand"><div class="logo"></div><div><b data-store>Bora</b><br><small>Delivery em tempo real</small></div></div>
    <nav class="nav"><a href="dashboard.html">Dashboard</a><a href="pedidos.html">Pedidos</a><a href="clientes.html">Clientes</a><a href="produtos.html">Produtos</a><a href="entregas.html">Entregas</a><a href="promocoes.html">Promoções</a><a href="relatorios.html">Relatórios</a><a class="active" href="configuracoes.html">Configurações</a><a class="" href="usuarios.html">Usuários</a><a href="planos.html">Planos</a></nav>
  </aside>
  <main class="main">
    <header class="top"><div class="title"><h1>Configurações da Loja</h1><p data-store>Sorveteria da Rosa</p></div>
      <a class="btn" href="#" onclick="Bora.logout();return false" style="background:#64748b">Sair</a></header>
    <div class="card">
      <h2>Identidade da loja (white-label)</h2>
      <p style="color:var(--muted);font-size:13px" id="planoInfo"></p>
      <form class="form" id="form">
        <div class="field full"><label>Nome exibido</label><input id="nomeExibicao"></div>
        <div class="field"><label>Cor primária</label><input type="color" id="corPrimaria" value="#7c3aed"></div>
        <div class="field"><label>Cor secundária <small id="lockSec" style="color:var(--muted)"></small></label><input type="color" id="corSecundaria" value="#22c55e"></div>
        <div class="field full"><label>Logo (PNG/JPG/SVG)</label><input type="file" id="logoFile" accept="image/png,image/jpeg,image/webp,image/svg+xml"></div>
        <div class="field full"><label>Banner (URL) <small id="lockBanner" style="color:var(--muted)"></small></label><input id="bannerUrl" placeholder="https://..."></div>
        <div class="field full"><button class="btn" type="submit">Salvar identidade</button> <span id="msg" style="margin-left:10px"></span></div>
      </form>
      <div class="theme-preview" id="preview"></div>
    </div>
  </main>
</div>
<script src="assets/js/api.js?v=20260623"></script><script src="assets/js/app.js?v=20260623"></script><script src="assets/js/whitelabel.js?v=20260623"></script><script src="assets/js/configuracoes.js?v=20260623"></script>
</body></html>
