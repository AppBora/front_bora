<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bora — Entrar</title>
  <link rel="icon" href="assets/img/icone-bora.svg">
  <link rel="stylesheet" href="assets/css/styles.css?v=20260623">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:#fff;border-radius:16px;box-shadow:0 8px 30px #0002;padding:32px;width:100%;max-width:360px}
    .login-card h1{margin:0 0 4px;font-size:26px;color:var(--primary,#7c3aed)}
    .login-card p{margin:0 0 20px;color:#64748b;font-size:14px}
    .login-card label{display:block;font-size:13px;color:#334155;margin:12px 0 4px}
    .login-card input{width:100%;padding:11px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;box-sizing:border-box}
    .login-card button{width:100%;margin-top:18px;padding:12px;border:0;border-radius:8px;background:var(--primary,#7c3aed);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
    .login-err{margin-top:12px;color:#dc2626;font-size:13px;min-height:18px}
    .login-foot{margin-top:16px;font-size:12px;color:#94a3b8;text-align:center}
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="form">
      <img src="assets/img/logo-bora.svg" alt="Bora" style="height:46px;margin-bottom:10px">
      <p>Acompanhe pedidos, entregas e vendas em tempo real.</p>
      <label>E-mail</label>
      <input type="email" id="email" required autocomplete="username" placeholder="voce@loja.com">
      <label>Senha</label>
      <input type="password" id="senha" required autocomplete="current-password" placeholder="••••••">
      <button type="submit" id="btn">Entrar</button>
      <div class="login-err" id="err"></div>
      <div class="login-foot" style="margin-bottom:6px">Não tem conta? <a href="cadastro.html" style="color:var(--primary,#7c3aed);font-weight:600;text-decoration:none">Criar grátis</a></div>
      <div class="login-foot">Bora · SaaS para pequenos deliveries</div>
    </form>
  </div>
  <script src="assets/js/api.js?v=20260623"></script>
  <script>
    if (Bora.token()) location.href = 'dashboard.html';
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn'), err = document.getElementById('err');
      btn.disabled = true; btn.textContent = 'Entrando...'; err.textContent = '';
      try {
        const resp = await Bora.login(document.getElementById('email').value.trim(), document.getElementById('senha').value);
        Bora.setSession(resp);
        location.href = 'dashboard.html';
      } catch (ex) {
        err.textContent = ex.message || 'Falha no login';
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
