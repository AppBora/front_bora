<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bora - Pedidos</title><link rel="icon" href="assets/img/icone-bora.svg"><link rel="stylesheet" href="assets/css/styles.css?v=20260623"></head><body>
<div class="layout">
  <aside class="side"><div class="brand"><div class="logo"></div><div><b data-store>Bora</b><br><small>Delivery em tempo real</small></div></div>
    <nav class="nav"></nav>
  </aside>
  <main class="main">
    <header class="top"><div class="title"><h1>Pedidos</h1><p>Quadro em tempo real · acompanhe da cozinha à entrega</p></div>
      <div style="display:flex;gap:10px"><a class="btn" href="novo-pedido.html">+ Novo pedido</a><a class="btn" href="#" onclick="Bora.logout();return false" style="background:#64748b">Sair</a></div>
    </header>

    <div class="board-toolbar">
      <div class="board-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="busca" placeholder="Buscar por cliente, telefone ou nº do pedido…" autocomplete="off">
      </div>
      <div class="chips" id="chips">
        <button class="chip active" data-f="ATIVOS"><span class="dot"></span>Em andamento</button>
        <button class="chip" data-f="TODOS">Todos</button>
        <button class="chip" data-f="DELIVERY">Delivery</button>
        <button class="chip" data-f="BALCAO">Balcão</button>
        <button class="chip" data-f="CANCELADO">Cancelados</button>
      </div>
      <div class="live-tag"><span class="live-dot"></span><span id="liveTxt">Ao vivo</span></div>
      <button class="btn secondary" onclick="window.__refresh&&__refresh()" title="Atualizar agora">↻</button>
    </div>

    <div class="kboard" id="kboard"></div>
  </main>
</div>
<script src="assets/js/api.js?v=20260623"></script>
<script src="assets/js/app.js?v=20260623"></script>

</body></html>
